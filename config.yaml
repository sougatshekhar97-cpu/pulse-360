# PULSE-360 configuration
# The brand you track, plus the competitors it is benchmarked against.
# Entity order matters: chart colors are assigned in this fixed order.
#
# Default setup: Airtel — the market I managed from the inside — benchmarked
# against the world's telecom giants for global share-of-voice context.
#
# news_query: the phrase searched in world news (GDELT). Use a distinctive
# phrase for short/ambiguous brand names.

brand:
  name: Airtel
  wikipedia_article: Bharti_Airtel
  news_query: Airtel

competitors:
  - name: Verizon
    wikipedia_article: Verizon
    news_query: Verizon
  - name: AT&T
    wikipedia_article: AT&T
    news_query: AT&T
  - name: T-Mobile
    wikipedia_article: T-Mobile_US
    news_query: T-Mobile
  - name: Vodafone
    wikipedia_article: Vodafone
    news_query: Vodafone
  - name: Deutsche Telekom
    wikipedia_article: Deutsche_Telekom
    news_query: Deutsche Telekom
  - name: China Mobile
    wikipedia_article: China_Mobile
    news_query: China Mobile

# How far back to fetch/keep daily series.
lookback_days: 90

# Reddit public search (optional — Reddit now blocks most keyless scripted
# access with 403; the fetcher degrades gracefully if blocked).
reddit:
  results_per_brand: 100
  time_window: month   # hour | day | week | month | year

# Channel Health Score weights — the same weighted-signal approach I used
# for enterprise account health scoring, applied to marketing channels.
# Must sum to 1.0.
health_weights:
  momentum: 0.35        # week-over-week trajectory
  stability: 0.20       # volatility of the daily series (lower churn of attention)
  sentiment: 0.25       # tone of news/community mentions
  share_of_voice: 0.20  # brand share vs competitors
